    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f2f2f2;
    }
    h1, h2, h3 {
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #fff;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }
    th {
      background-color: #4CAF50;
      color: white;
    }
    .green { background-color: #4CAF50; color: white; }
    .orange { background-color: #FFA500; color: white; }
    .red { background-color: #FF6347; color: white; }
    #mecze-table {
      margin-top: 40px;
    }
    .match-row {
      padding: 10px;
    }

    /* Szary nagłówek w tabelce z typami */
    .round-matches table thead th {
      background-color: #ccc;
      color: #000;
    }

    /* Zwijane kolejki */
    .round-header {
      cursor: pointer;
      background-color: #2196F3;
      color: white;
      padding: 10px;
      margin-top: 20px;
      border-radius: 5px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      transition: background-color 0.3s;
    }
    .round-header:hover {
      background-color: #1976D2;
    }
    .round-header .arrow {
      margin-left: 10px;
      transition: transform 0.3s;
      display: inline-block;
    }
    .round-matches {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s ease;
      margin-bottom: 20px;
    }
    .round-matches.open {
      max-height: 2000px;
    }

    #final-winner {
      text-align: center;
      font-size: 1.3em;
      margin: 20px 0;
      font-weight: bold;
    }
  </style>
</head>

    "Holandia":"nl","Portugalia":"pt","Belgia":"be","Chorwacja":"hr","Urugwaj":"uy","Szwajcaria":"ch","Dania":"dk",
    "Stany Zjednoczone":"us","Polska":"pl"

  <script>
    // --- Tutaj wpisujesz zwycięzcę turnieju ---
    const finalWinner = "null"; // <-- wpisz nazwę kraju

    // Wczytanie krajów
    const kraje = JSON.parse(document.getElementById("kraje").textContent);

    // Wyświetlenie zwycięzcy z flagą
    const winnerContainer = document.getElementById("final-winner");
    winnerContainer.innerHTML = `Zwycięzca turnieju: ${finalWinner} 
      ${kraje[finalWinner] ? `<img src="https://flagcdn.com/24x18/${kraje[finalWinner]}.png" alt="${finalWinner}" />` : ''} !!!!!`;

    // --- Funkcje wyświetlania tabeli i meczów ---
    function loadData() {
      const mecze = JSON.parse(document.getElementById("mecze").textContent);
      const uczestnicy = JSON.parse(document.getElementById("uczestnicy").textContent);

      const wyniki = {};
      mecze.forEach(m => { if(m.score1!==null&&m.score2!==null) wyniki[m.id]=[m.score1,m.score2]; });

      // Tabela wyników
      const tabela = uczestnicy.map(u => {
        let punkty=0;
        Object.entries(u.predictions).forEach(([id,typ])=>{
          const wynik = wyniki[id];
          if(!wynik) return;
          const [r1,r2] = wynik;
          if(typ.score1===r1 && typ.score2===r2) punkty+=3;
          else if ((typ.score1>typ.score2 && r1>r2)||(typ.score1<typ.score2 && r1<r2)||(typ.score1===typ.score2 && r1===r2)) punkty+=1;
        });
        let bonus=0;
        if(finalWinner && finalWinner===u.winner) bonus=10;
        return { name:u.name, flaga:kraje[u.winner]||"", punkty, bonus, suma: punkty+bonus };
      });
      tabela.sort((a,b)=>b.suma-a.suma);

      const container=document.getElementById("table-container");
      container.innerHTML="";
      const table=document.createElement("table");
      table.innerHTML=`<thead><tr><th>Uczestnik</th><th>Flaga</th><th>Punkty</th><th>Bonus</th><th>Suma</th></tr></thead>
        <tbody>${tabela.map(u=>`<tr><td>${u.name}</td><td>${u.flaga?`<img src="https://flagcdn.com/24x18/${u.flaga}.png" alt="${u.flaga}" />`:''}</td><td>${u.punkty}</td><td>${u.bonus}</td><td>${u.suma}</td></tr>`).join('')}</tbody>`;
      container.appendChild(table);

      // Mecze pogrupowane po rundach
      const meczePoKolejkach = {};
      mecze.forEach(m => { if(!meczePoKolejkach[m.round]) meczePoKolejkach[m.round]=[]; meczePoKolejkach[m.round].push(m); });

      const meczeTable = document.getElementById("mecze-table");
      meczeTable.innerHTML = "";

      Object.entries(meczePoKolejkach).forEach(([round, roundMatches]) => {
        const roundHeader = document.createElement("div");
        roundHeader.className = "round-header";
        roundHeader.innerHTML = `🏟️ ${round} <span class="arrow">▶</span>`;
        meczeTable.appendChild(roundHeader);

        const roundDiv = document.createElement("div");
        roundDiv.className = "round-matches";

        roundMatches.forEach(m => {
          const date = new Date(m.date);
          const matchDate = `${date.getDate()}.${date.getMonth()+1}.${date.getFullYear()} ${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
          const matchDiv = document.createElement("div");
          matchDiv.className = "match-row";

          let tableHTML = `<strong>${matchDate}</strong> – ${m.team1} vs ${m.team2} ${wyniki[m.id]?`| Wynik: ${wyniki[m.id][0]} - ${wyniki[m.id][1]}`:"| Wynik: Oczekiwany"}
            <table><thead><tr><th>Uczestnik</th><th>Typ</th><th>Wynik</th></tr></thead>
            <tbody>${uczestnicy.map(u=>{
              const typ=u.predictions[m.id];
              if(!typ) return '';
              let color="";
              if(wyniki[m.id]){
                if(typ.score1===wyniki[m.id][0] && typ.score2===wyniki[m.id][1]) color="green";
                else if((typ.score1>typ.score2 && wyniki[m.id][0]>wyniki[m.id][1])||(typ.score1<typ.score2 && wyniki[m.id][0]<wyniki[m.id][1])||(typ.score1===typ.score2 && wyniki[m.id][0]===wyniki[m.id][1])) color="orange";
                else color="red";
              }
              return `<tr class="${color}"><td>${u.name}</td><td>${typ.score1} - ${typ.score2}</td><td>${wyniki[m.id]?wyniki[m.id][0]+" - "+wyniki[m.id][1]:"?"}</td></tr>`;
            }).join('')}</tbody></table>`;
          matchDiv.innerHTML = tableHTML;
          roundDiv.appendChild(matchDiv);
        });

        meczeTable.appendChild(roundDiv);

        // Zwijanie/rozwijanie
        const arrow = roundHeader.querySelector('.arrow');
        roundHeader.addEventListener("click", () => {
          const isOpen = roundDiv.classList.toggle("open");
          arrow.style.transform = isOpen ? "rotate(90deg)" : "rotate(0deg)";
          roundDiv.style.maxHeight = isOpen ? roundDiv.scrollHeight + "px" : "0px";
        });
      });
    }

    loadData();
  </script>
